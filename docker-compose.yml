services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    image: lyrics-webapp:latest
    container_name: lyrics-webapp
    restart: unless-stopped
    ports:
      - "${GRADIO_PORT:-7860}:7860"
    volumes:
      # Models — bind-mount from host. See README for download instructions.
      - ./models:/app/models:ro
      # Persistent cache for separated stems, translations, ACE-Step candidates.
      - ./cache:/app/cache
      # Hugging Face hub cache (so models you DL on the host or inside the
      # container persist across rebuilds).
      - ./.hf:/app/.hf
    environment:
      # Override these by setting them in your shell or a `.env` file.
      ACE_CKPT_DIR: /app/models/ace-step-v1.5
      DPO_MODEL_PATH: /app/models/gemma-dpo-final
      PIPELINE_CACHE_ROOT: /app/cache
      HF_HOME: /app/.hf
      GRADIO_HOST: 0.0.0.0
      GRADIO_PORT: 7860
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
