services:
  webapp:
    image: lyrics-webapp:latest
    container_name: lyrics-webapp
    restart: unless-stopped
    ports:
      - "${WEBAPP_PORT:-7860}:7860"
    volumes:
      # All paths must be absolute and host-visible (compose runs inside a
      # devcontainer whose CWD does not match the host filesystem).
      - ${MODELS_DIR}:/app/models:ro
      - ${CACHE_DIR}:/app/cache
      - ${HF_DIR}:/app/.hf
    environment:
      # Override these by setting them in your shell or a `.env` file.
      ACE_CKPT_DIR: /app/models/ace-step-v1.5
      DPO_MODEL_PATH: /app/models/gemma-dpo-final
      PIPELINE_CACHE_ROOT: /app/cache
      HF_HOME: /app/.hf
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
